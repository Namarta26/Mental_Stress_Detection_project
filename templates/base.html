<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mental Stress Detection{% endblock %}</title>
    <script>
        document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{{ url_for('home') }}">Stress Detection</a>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('prediction') }}">Prediction</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
                </ul>
                <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <span class="theme-toggle-icon">☾</span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="border-top py-4 mt-5">
        <div class="container text-muted small">
            Smart Mental Stress Detection and Risk Prediction System
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
